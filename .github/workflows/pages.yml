name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.203"
  APP_URL: "http://localhost:5250"
  PAGES_BASE: "/ASP.NET-FIFA-WorldCup-2026/"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK (exact version from global.json)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore + Publish app
        run: |
          dotnet restore WorldCup2026.csproj
          dotnet publish WorldCup2026.csproj -c Release -o ./publish_out --no-restore

      - name: Start app in background for static prerendering (SSG)
        run: |
          export ASPNETCORE_URLS="${{ env.APP_URL }}"
          export ASPNETCORE_ENVIRONMENT="Production"
          export DOTNET_ENVIRONMENT="Production"
          nohup dotnet ./publish_out/WorldCup2026.dll > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          for i in $(seq 1 80); do
            sleep 1
            if curl -sfSL "${{ env.APP_URL }}/" --max-time 5 -o /dev/null; then
              echo "OK app is up after ${i}s"
              break
            fi
          done
          curl -sfSL "${{ env.APP_URL }}/" --max-time 10 -o /dev/null || { echo "APP FAILED"; tail -n 60 /tmp/app.log; exit 1; }

      - name: Prerender 19 routes (lax validation)
        run: |
          SITE="_site"
          rm -rf "$SITE" && mkdir -p "$SITE"
          PAGES=(
            "/"
            "/matches"
            "/matches?status=finished"
            "/matches?status=running"
            "/matches?status=upcoming"
            "/teams"
            "/teams?view=table"
            "/teams?view=list"
            "/news"
            "/rankings"
            "/rankings?sort=total"
            "/rankings?sort=attack"
            "/rankings?sort=midfield"
            "/rankings?sort=defense"
            "/rankings?sort=gk"
            "/scorers"
            "/topscorers"
            "/stadiums"
          )
          OK=0
          FAIL=0
          for path in "${PAGES[@]}"; do
            rel="${path#/}"
            if [ -z "$rel" ]; then
              outdir="$SITE"
              outfile="$SITE/index.html"
            else
              clean="${rel%%\?*}"
              qs="${rel#*\?}"
              if [ "$qs" = "$rel" ]; then
                outdir="$SITE/$clean"
                outfile="$SITE/$clean/index.html"
              else
                sfx=$(echo "$qs" | tr '&=' '__')
                outdir="$SITE/$clean/_$sfx"
                outfile="$SITE/$clean/_$sfx/index.html"
              fi
            fi
            mkdir -p "$outdir"
            code=$(curl -sSL --max-time 60 -w "%{http_code}" -o "$outfile" "${{ env.APP_URL }}${path}" || echo "000")
            size=$(stat -c%s "$outfile" 2>/dev/null || echo 0)
            if [ "$code" = "200" ] && [ "$size" -gt 1000 ]; then
              OK=$((OK+1))
              # Only rewrite base href; leave all other URLs alone
              sed -i -E "s|<base href=\"/\" */?>|<base href=\"${{ env.PAGES_BASE }}\">|Ig" "$outfile"
              echo "  OK [$code] $path  $size bytes  ->  ${outfile#$SITE/}"
            else
              FAIL=$((FAIL+1))
              echo "  FAIL [$code] $path  $size bytes -> ${outfile#$SITE/}"
              head -c 200 "$outfile" | tr '\n' ' ' | cut -c1-160
              echo ""
            fi
          done
          echo ""
          echo "SUMMARY: OK=$OK  FAIL=$FAIL"
          find "$SITE" -name '*.html' -printf '%10s %p\n' | sort -rn | head -n 30
          COUNT=$(find "$SITE" -name '*.html' -type f | wc -l | tr -d ' ')
          echo "Total HTML files: $COUNT"
          # Lax validation: render at least 7 core pages successfully and >50KB total
          TOTSIZE=$(du -sb "$SITE" | cut -f1)
          echo "Total _site size: $TOTSIZE bytes"
          if [ "$COUNT" -ge 7 ] && [ "$OK" -ge 5 ] && [ "$TOTSIZE" -gt 30000 ]; then
            echo "PRERENDER PASSED"
          else
            echo "PRERENDER MINIMUMS NOT MET (need HTML>=7, OK>=5, SIZE>=30KB).  Full app.log tail:"
            tail -n 80 /tmp/app.log || true
            echo ""
            echo "CONTINUING ANYWAY (attempting best-effort deploy if index.html exists):"
            if [ ! -f "$SITE/index.html" ] || [ "$(stat -c%s "$SITE/index.html" 2>/dev/null || echo 0)" -lt 2000 ]; then
              echo "FATAL: usable home page missing, stopping build."
              exit 1
            fi
          fi

      - name: Copy wwwroot assets + .nojekyll + 404 fallback
        run: |
          SITE="_site"
          if [ -d "./publish_out/wwwroot" ]; then
            cp -r ./publish_out/wwwroot/. "$SITE/"
          fi
          touch "$SITE/.nojekyll"
          if [ -f "$SITE/index.html" ] && [ "$(stat -c%s "$SITE/index.html")" -gt 2000 ]; then
            cp "$SITE/index.html" "$SITE/404.html"
          else
            echo "<!doctype html><meta charset=utf-8><meta http-equiv=refresh content='0;url=./'><body><a href=./>Go home</a>" > "$SITE/404.html"
          fi
          ls -la "$SITE"

      - name: Stop prerendering app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            PID=$(cat /tmp/app.pid)
            kill $PID 2>/dev/null
            sleep 1
            kill -9 $PID 2>/dev/null || true
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
