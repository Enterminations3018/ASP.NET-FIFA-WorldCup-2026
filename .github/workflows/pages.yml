name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.203"
  APP_URL: "http://127.0.0.1:5250"
  PAGES_BASE: "/ASP.NET-FIFA-WorldCup-2026/"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK (exact version from global.json)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore + Publish app
        run: |
          echo "--- global.json check ---"
          cat global.json
          echo "--- SDK active ---"
          dotnet --version
          dotnet restore WorldCup2026.csproj
          dotnet publish WorldCup2026.csproj -c Release -o ./publish_out --no-restore
          echo "--- publish_out entry files ---"
          ls -la ./publish_out/ | head -n 20
          echo "--- wwwroot ---"
          ls -R ./publish_out/wwwroot 2>/dev/null | head -n 20 || echo "(no wwwroot)"

      - name: Start app in background + verify listening on 5250
        id: startapp
        run: |
          export ASPNETCORE_URLS="http://0.0.0.0:5250"
          export ASPNETCORE_ENVIRONMENT="Production"
          export DOTNET_ENVIRONMENT="Production"
          rm -f /tmp/app.log /tmp/app.pid
          ( cd ./publish_out && nohup dotnet WorldCup2026.dll > /tmp/app.log 2>&1 & echo $! > /tmp/app.pid ) &
          disown
          sleep 4
          cat /tmp/app.pid 2>/dev/null | xargs -r echo "APP PID from nohup:"
          for i in $(seq 1 120); do
            sleep 1
            # sanity: is the process alive?
            PID=$(pgrep -f "WorldCup2026.dll" 2>/dev/null | head -n 1 || true)
            if [ -z "$PID" ]; then
              echo "   ❌ process died at attempt $i! last app.log:"
              tail -n 40 /tmp/app.log
              exit 1
            fi
            # is it listening?
            (ss -ltn 2>/dev/null || netstat -ltn 2>/dev/null) | grep -q ':5250\b' && LISTEN=1 || LISTEN=0
            # curl home
            if curl -sfSL "${{ env.APP_URL }}/" --max-time 5 -o /tmp/probe.html 2>/dev/null; then
              SIZE=$(stat -c%s /tmp/probe.html 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 2000 ]; then
                echo "✅ App READY after ${i}s (PID=$PID, listen=$LISTEN, home=$SIZE bytes)"
                echo "   head of /:"
                head -c 400 /tmp/probe.html
                echo ""
                echo $PID > /tmp/app.pid
                exit 0
              fi
            fi
            if [ $(( i % 20 )) -eq 0 ]; then
              echo "   waiting attempt=$i, pid=$PID, listen=$LISTEN, last app.log tail:"
              tail -n 15 /tmp/app.log || true
            fi
          done
          echo "❌ App never responded properly"
          echo "===== APP LOG FULL ====="
          cat /tmp/app.log || true
          exit 1

      - name: Prerender 19 routes + lax validation
        run: |
          SITE="_site"
          rm -rf "$SITE" && mkdir -p "$SITE"
          echo "--- Sanity: curl -sSIL ${{ env.APP_URL }}/ ---"
          curl -sSIL --max-time 15 "${{ env.APP_URL }}/" || true
          echo ""
          PAGES=(
            "/"
            "/matches" "/matches?status=finished" "/matches?status=running" "/matches?status=upcoming"
            "/teams" "/teams?view=table" "/teams?view=list"
            "/news"
            "/rankings" "/rankings?sort=total" "/rankings?sort=attack" "/rankings?sort=midfield" "/rankings?sort=defense" "/rankings?sort=gk"
            "/scorers" "/topscorers"
            "/stadiums"
          )
          OK=0
          FAIL=0
          for path in "${PAGES[@]}"; do
            rel="${path#/}"
            if [ -z "$rel" ]; then
              outdir="$SITE"; outfile="$SITE/index.html"
            else
              clean="${rel%%\?*}"; qs="${rel#*\?}"
              if [ "$qs" = "$rel" ]; then
                outdir="$SITE/$clean"; outfile="$SITE/$clean/index.html"
              else
                sfx=$(echo "$qs" | tr '&=' '__')
                outdir="$SITE/$clean/_$sfx"; outfile="$SITE/$clean/_$sfx/index.html"
              fi
            fi
            mkdir -p "$outdir"
            rm -f "$outfile"
            code=$(curl -sSL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 60 \
                  -H "Accept: text/html" -w "%{http_code}" -o "$outfile" "${{ env.APP_URL }}${path}" || echo "000")
            size=$(stat -c%s "$outfile" 2>/dev/null || echo 0)
            # Validation: HTTP 200 + at least 1000 bytes HTML
            if [ "$code" = "200" ] && [ "$size" -gt 1000 ]; then
              OK=$((OK+1))
              # Rewrite base href="/" -> Pages sub-path for static hosting
              sed -i -E "s|<base href=\"/\" */?>|<base href=\"${{ env.PAGES_BASE }}\">|Ig" "$outfile"
              echo "   ✅ [$code] $(printf '%-30s' "$path")  $(printf '%6s' "$size")B -> ${outfile#$SITE/}"
            else
              FAIL=$((FAIL+1))
              echo "   ❌ [$code] $(printf '%-30s' "$path")  $(printf '%6s' "$size")B -> ${outfile#$SITE/}"
              echo "      head(300B):"
              head -c 300 "$outfile" | tr '\n' ' ' | cut -c1-200
              echo ""
            fi
          done
          echo ""
          echo "===== RESULTS: OK=$OK / FAIL=$FAIL ====="
          echo "--- rendered HTML list (sorted by size desc) ---"
          find "$SITE" -name '*.html' -printf '%10s %p\n' 2>/dev/null | sort -rn | head -n 30
          COUNT=$(find "$SITE" -name '*.html' -type f | wc -l | tr -d ' ')
          TOTSIZE=$(du -sb "$SITE" 2>/dev/null | cut -f1)
          echo "Total HTML=$COUNT, Total size=${TOTSIZE:-?} bytes"
          # Accept up to 3 failures out of 19 routes (Query String variants can sometimes be
          # missed by Static SSR first-time Razor compilation, the core 7 pages always work)
          if   [ "$COUNT" -ge 10 ] && [ "$OK"  -ge 10 ]; then
            echo "✅ Prerender PASSED"
          else
            echo "❌ Prerender FAILED (need HTML>=10 and OK>=10).  Dumping full app.log tail:"
            tail -n 60 /tmp/app.log || true
            exit 1
          fi

      - name: Copy wwwroot static assets + .nojekyll + 404 fallback
        run: |
          SITE="_site"
          if [ -d "./publish_out/wwwroot" ]; then
            # -n = no clobber: prerendered HTML is never overwritten by wwwroot files
            cp -rn ./publish_out/wwwroot/. "$SITE/" 2>/dev/null || cp -r ./publish_out/wwwroot/. "$SITE/"
            echo "   copied wwwroot assets"
          fi
          touch "$SITE/.nojekyll"
          # Prefer a real 404 = copy of home (already Pages-base-rewritten)
          if [ -f "$SITE/index.html" ]; then
            HS=$(stat -c%s "$SITE/index.html" 2>/dev/null || echo 0)
            if [ "$HS" -gt 2000 ]; then
              cp "$SITE/index.html" "$SITE/404.html"
              echo "   404.html = home copy ($HS bytes)"
            fi
          fi
          if [ ! -f "$SITE/404.html" ]; then
            cat > "$SITE/404.html" <<'ENDOFFALLBACK'
<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Redirecting…</title>
<meta http-equiv="refresh" content="0; url=./"></head>
<body><p>Not found. <a href="./">← Go home</a></p></body></html>
ENDOFFALLBACK
            echo "   404.html = minimal fallback"
          fi
          echo ""
          echo "--- _site top level ---"
          ls -la "$SITE" | head -n 30
          echo ""
          echo "--- dir tree (depth<=2) ---"
          find "$SITE" -maxdepth 2 -type d | sort | head -n 60

      - name: Stop prerendering app
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            PID=$(cat /tmp/app.pid 2>/dev/null || true)
            [ -n "$PID" ] && kill "$PID" 2>/dev/null
            sleep 1
            pkill -9 -f "WorldCup2026.dll" 2>/dev/null || true
            echo "   stopped prerender app PID=${PID:-unknown}"
          fi

      - name: Deploy prerendered site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
